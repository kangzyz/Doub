name: doub-chat

services:
  app:
    image: ${DOUB_CHAT_IMAGE:-ghcr.io/kangzyz/doub-chat:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doub-chat-app
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - app_storage:/app/storage
      - ./config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - doub-chat
volumes:
  app_storage:
    name: doub-chat-app-storage

networks:
  doub-chat:
    name: doub-chat-network
