services:
  docling:
    container_name: doub-chat-docling
    image: doub-chat-docling:latest
    build:
      context: ../../
      dockerfile: docker/docling/Dockerfile
    ports:
      - "127.0.0.1:8005:8005"
    restart: unless-stopped
    networks:
      - doub-chat

networks:
  doub-chat:
    external: true
    name: doub-chat-network
