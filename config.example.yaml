app:
  name: DEEIX Chat
  # REQUIRED for deployment: change to prod and replace security/admin defaults below.
  env: dev

server:
  # Local development defaults. Change only when backend/frontend ports or public URLs differ.
  http_port: "8080"
  cors_allow_origin: "http://127.0.0.1:8080,http://localhost:8080,http://127.0.0.1:3000,http://localhost:3000"
  trusted_proxies: "127.0.0.1/32,::1/128"
  public_api_base_url: "http://127.0.0.1:8080"
  public_web_base_url: "http://localhost:3000"
  frontend_dist_dir: "./frontend/out"
  read_header_timeout_seconds: 10
  read_timeout_seconds: 120
  idle_timeout_seconds: 120
  max_header_bytes: 1048576

security:
  # REQUIRED for deployment: replace both values with strong random secrets.
  # data_encryption_key protects upstream API keys, SSO secrets, MCP tokens, and TOTP secrets.
  jwt_secret: "change-me-dev-jwt-secret"
  data_encryption_key: "change-me-dev-data-encryption-key-32-bytes-min"

database:
  postgres:
    # REQUIRED: set this to your local PostgreSQL DSN.
    dsn: "postgres://deeix_chat:deeix_chat_dev_2026@127.0.0.1:5432/deeix_chat?sslmode=disable&TimeZone=Asia%2FShanghai"
    max_open_conns: 30
    max_idle_conns: 10
    conn_max_lifetime_minutes: 60
    conn_max_idle_time_minutes: 10
  redis:
    # REQUIRED: set these to your local Redis connection settings.
    addr: "127.0.0.1:6379"
    password: "deeix_chat_redis_dev"
    db: 0

storage:
  # Optional: switch to s3 and fill the s3 block when using object storage.
  backend: local
  local:
    root_dir: ./storage
  s3:
    endpoint: ""
    region: auto
    bucket: ""
    prefix: ""
    access_key_id: ""
    secret_access_key: ""
    force_path_style: true

geoip:
  # Optional: use none to disable, or mmdb for a local GeoIP database.
  provider: ipwhois

observability:
  tracing:
    # Optional: configure OpenTelemetry collector endpoint to enable tracing.
    # Omit enabled to auto-enable tracing when endpoint is set.
    # If enabled is true, endpoint is required; if enabled is false, tracing stays disabled.
    # enabled: true
    endpoint: ""
    headers: ""
    insecure: false
    sampling_rate: 1
